---
name: Build and push container
# yamllint disable rule:truthy
on: workflow_dispatch
# on:
#   workflow_run:
#     workflows: ["Run Tests"]
#     branches: [main]
#     types: [completed]
# yamllint enable

env:
  # internal forgejo registry of @mfa
  FORGEJO_HOST: forgejo.tail07efb.ts.net

jobs:
  build:
    runs-on: catthehacker
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'amd64'
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: http://${{ env.FORGEJO_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_PACKAGES_TOKEN_RW }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.FORGEJO_HOST }}/mfa/acl-feed:latest
          context: .
