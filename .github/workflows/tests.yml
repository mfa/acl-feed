---
name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.13
          enable-cache: true
      - name: Run tests with pytest
        run: uv run python -m pytest
